<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="<?= webAppUrl ?>" target="_top">
<title>StockHome</title>
<style>
/* ====== 共通スタイル（全画面で使う） ====== */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:15px;color:#333;background:#f5f5f5;padding-bottom:70px}
.container{max-width:480px;margin:0 auto;padding:12px}
h1{font-size:18px;padding:14px 12px;background:#4a86c8;color:#fff;text-align:center}
h2{font-size:16px;margin:16px 0 8px;color:#4a86c8}
.card{background:#fff;border-radius:8px;padding:14px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card-title{font-weight:bold;font-size:15px;margin-bottom:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;color:#fff}
.badge-danger{background:#e74c3c}
.badge-warn{background:#f39c12}
.badge-ok{background:#27ae60}
.badge-info{background:#3498db}
.btn{display:inline-block;padding:12px 20px;border:none;border-radius:6px;
  font-size:15px;font-weight:bold;cursor:pointer;text-align:center;text-decoration:none;
  width:100%;margin-bottom:8px;color:#fff}
.btn-primary{background:#4a86c8}
.btn-success{background:#27ae60}
.btn-danger{background:#e74c3c}
.btn-outline{background:#fff;color:#4a86c8;border:2px solid #4a86c8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.msg{padding:10px;border-radius:6px;margin-bottom:10px;font-size:14px}
.msg-success{background:#d4edda;color:#155724}
.msg-error{background:#f8d7da;color:#721c24}
.loading{text-align:center;padding:20px;color:#888}
/* ナビ */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:1px solid #ddd;display:flex;z-index:100}
.nav a{flex:1;text-align:center;padding:8px 2px 6px;font-size:11px;
  color:#888;text-decoration:none;line-height:1.2}
.nav a.active{color:#4a86c8;font-weight:bold}
.nav a span{display:block;font-size:18px;margin-bottom:2px}
/* テーブル風 */
.info-row{display:flex;justify-content:space-between;padding:4px 0;
  border-bottom:1px solid #f0f0f0;font-size:14px}
.info-row .label{color:#888}
.info-row .value{font-weight:bold}
.alert-item{display:flex;justify-content:space-between;align-items:center;
  padding:10px 6px;border-bottom:1px solid #f0f0f0;color:inherit;
  text-decoration:none;cursor:pointer;border-radius:4px;
  transition:background .15s}
.alert-item:hover,.alert-item:active{background:#f3f7fc}
.alert-item .name{font-weight:bold;flex:1}
.alert-item .days{text-align:right;min-width:80px;font-size:14px}
.alert-item .chev{margin-left:6px;color:#bbb;font-size:16px}
</style>
</head>
<body>

<h1>StockHome</h1>
<div class="container" id="app">
  <div class="loading" id="loading">読み込み中...</div>
</div>

<!-- ナビゲーション -->
<nav class="nav">
  <a href="?page=home" class="active"><span>🏠</span>ホーム</a>
  <a href="?page=items"><span>📦</span>消耗品</a>
  <a href="?page=stocks"><span>📊</span>在庫</a>
  <a href="?page=purchaseForm"><span>🛒</span>購入登録</a>
  <a href="?page=notifications"><span>🔔</span>通知</a>
</nav>

<script>
var APP_DATA = null;

function init() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) { showError(res.message); return; }
      APP_DATA = res.data;
      renderHome(res.data);
    })
    .withFailureHandler(function(e) { showError(e.message); })
    .getInitialData();
}

function renderHome(data) {
  var html = '';

  // ユーザー未登録の場合
  if (!data.currentUser) {
    html += '<div class="card">';
    html += '<p>ユーザーが未登録です。<a href="?page=gmailSettings">設定画面</a>でユーザーを登録してください。</p>';
    html += '</div>';
  } else {
    html += '<div class="card"><div class="info-row"><span class="label">ログイン中</span>';
    html += '<span class="value">' + esc(data.currentUser.user_name) + '</span></div></div>';
  }

  // 在庫アラート
  html += '<h2>在庫切れが近い品目</h2>';
  if (data.alertStocks.length === 0) {
    html += '<div class="card"><p>在庫アラートはありません。</p></div>';
  } else {
    html += '<div class="card">';
    for (var i = 0; i < data.alertStocks.length; i++) {
      var s = data.alertStocks[i];
      var days = s.estimated_days_left !== '' ? Math.round(Number(s.estimated_days_left)) : '?';
      var badgeClass = (days !== '?' && days <= 3) ? 'badge-danger' : 'badge-warn';
      html += '<a class="alert-item" href="?page=stocks&itemId=' + esc(s.item_id) + '">';
      html += '<span class="name">' + esc(s.item_name) + '</span>';
      html += '<span class="days"><span class="badge ' + badgeClass + '">' +
        (days !== '?' ? 'あと' + days + '日' : '不明') + '</span></span>';
      html += '<span class="chev">›</span>';
      html += '</a>';
    }
    html += '</div>';
  }

  // 未確認候補
  if (data.pendingCandidateCount > 0) {
    html += '<div class="card">';
    html += '<p><span class="badge badge-info">' + data.pendingCandidateCount + '件</span> ';
    html += '未確認の自動取込候補があります。</p>';
    html += '<a href="?page=importCandidates" class="btn btn-outline btn-sm" style="margin-top:8px">候補を確認</a>';
    html += '</div>';
  }

  // クイックアクション
  html += '<h2>アクション</h2>';
  html += '<a href="?page=itemForm" class="btn btn-primary">消耗品を追加</a>';
  html += '<a href="?page=purchaseForm" class="btn btn-success">購入を記録</a>';
  html += '<a href="?page=stockCorrection" class="btn btn-outline">在庫を補正</a>';
  html += '<a href="?page=importCandidates" class="btn btn-outline">取込候補を確認</a>';
  html += '<a href="?page=gmailSettings" class="btn btn-outline">Gmail 設定</a>';

  document.getElementById('app').innerHTML = html;
}

function showError(msg) {
  document.getElementById('app').innerHTML =
    '<div class="msg msg-error">' + esc(msg) + '</div>';
}

function esc(s) {
  if (!s && s !== 0) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}

init();
</script>
</body>
</html>
