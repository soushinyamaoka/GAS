<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="<?= webAppUrl ?>" target="_top">
<title>消耗品登録 - StockHome</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:15px;color:#333;background:#f5f5f5;padding-bottom:70px}
.container{max-width:480px;margin:0 auto;padding:12px}
h1{font-size:18px;padding:14px 12px;background:#4a86c8;color:#fff;text-align:center}
.card{background:#fff;border-radius:8px;padding:14px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.1)}
label{display:block;font-size:14px;font-weight:bold;margin:10px 0 4px;color:#555}
input[type=text],input[type=number],input[type=url],select,textarea{
  width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;font-size:15px;
  font-family:inherit}
textarea{resize:vertical;min-height:80px}
input:focus,select:focus{border-color:#4a86c8;outline:none}
.hint{font-size:12px;color:#888;margin-top:2px}
.btn{display:inline-block;padding:14px 20px;border:none;border-radius:6px;
  font-size:15px;font-weight:bold;cursor:pointer;width:100%;color:#fff;margin-top:12px}
.btn-primary{background:#4a86c8}.btn-outline{background:#fff;color:#4a86c8;border:2px solid #4a86c8}
.btn:disabled{opacity:.5}
.msg{padding:10px;border-radius:6px;margin-bottom:10px;font-size:14px}
.msg-success{background:#d4edda;color:#155724}
.msg-error{background:#f8d7da;color:#721c24}
.loading{text-align:center;padding:20px;color:#888}
.check-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.check-row input{width:auto}
.alt-row{border:1px solid #e0e0e0;border-radius:6px;padding:8px;margin-top:6px;background:#fafafa;position:relative}
.alt-row input{margin-bottom:4px}
.alt-row .alt-del{position:absolute;top:6px;right:6px;background:none;border:none;color:#e74c3c;
  font-size:18px;cursor:pointer;padding:2px 6px;line-height:1}
.alt-add{background:#fff;color:#4a86c8;border:1px dashed #4a86c8;border-radius:6px;
  padding:8px;width:100%;cursor:pointer;font-size:13px;margin-top:6px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:1px solid #ddd;display:flex;z-index:100}
.nav a{flex:1;text-align:center;padding:8px 2px 6px;font-size:11px;
  color:#888;text-decoration:none;line-height:1.2}
.nav a span{display:block;font-size:18px;margin-bottom:2px}
</style>
</head>
<body>

<h1 id="pageTitle">消耗品登録</h1>
<div class="container">
  <div id="msg"></div>
  <div class="card" id="formArea">
    <form id="itemForm" onsubmit="save(event)">
      <input type="hidden" id="item_id" value="">

      <label for="item_name">品名 *</label>
      <input type="text" id="item_name" required>

      <label for="category">カテゴリ</label>
      <input type="text" id="category" placeholder="例: 洗剤, 食品, 日用品">

      <label for="unit">単位</label>
      <input type="text" id="unit" placeholder="例: 個, 本, 袋" value="個">

      <label for="default_purchase_qty">標準購入数 *</label>
      <input type="number" id="default_purchase_qty" min="1" value="1" required>

      <label for="daily_consumption">1日あたりの消費数 *</label>
      <input type="number" id="daily_consumption" min="0.01" step="0.01" value="0.03" required>
      <div class="hint">例: 1日2個消費 → 2、30日で1個 → 0.03</div>

      <label for="alert_before_days">在庫切れ何日前に通知</label>
      <input type="number" id="alert_before_days" min="0" value="7">
      <div class="hint">通知が届くタイミング（注文〜届くまでの日数も考慮）</div>

      <label for="low_stock_threshold_qty">在庫数しきい値通知数</label>
      <input type="number" id="low_stock_threshold_qty" min="0" step="0.1" placeholder="空欄可">
      <div class="hint">推定残数がこの値以下で通知</div>

      <label for="purchase_url">購入先URL</label>
      <input type="url" id="purchase_url" placeholder="https://...">

      <label>代替購入候補</label>
      <div class="hint" style="margin-bottom:6px">売り切れ時の代わりに買える商品。名前/URL/メモを最大10件まで登録できます</div>
      <div id="altList"></div>
      <button type="button" class="alt-add" onclick="addAlt()">+ 代替品を追加</button>

      <label for="item_memo">メモ</label>
      <textarea id="item_memo" maxlength="1000" placeholder="こだわり、買う時の注意、家族向けの伝達事項など（最大1000文字）"></textarea>

      <label for="notify_target_type">通知先</label>
      <select id="notify_target_type">
        <option value="all">全員</option>
        <option value="representative">代表者</option>
        <option value="specific_user">指定ユーザー</option>
      </select>

      <div id="specificUserRow" style="display:none">
        <label for="notify_target_user_id">通知先ユーザー</label>
        <select id="notify_target_user_id"></select>
      </div>

      <div class="check-row">
        <input type="checkbox" id="notification_enabled" checked>
        <label for="notification_enabled" style="margin:0;font-weight:normal">通知を有効にする</label>
      </div>

      <div class="check-row">
        <input type="checkbox" id="is_inventory_unknown">
        <label for="is_inventory_unknown" style="margin:0;font-weight:normal">在庫量を自動推定しない（在庫不明）</label>
      </div>
      <div class="hint">来客時のみ使用・季節用品など、線形消費モデルが当てにならない品目用。ON にするとアラート対象から外れます</div>

      <button type="submit" class="btn btn-primary" id="submitBtn">保存</button>
      <a href="?page=items" class="btn btn-outline" style="display:block;text-align:center;margin-top:8px">戻る</a>
    </form>
  </div>
</div>

<nav class="nav">
  <a href="?page=home"><span>🏠</span>ホーム</a>
  <a href="?page=items"><span>📦</span>消耗品</a>
  <a href="?page=stocks"><span>📊</span>在庫</a>
  <a href="?page=purchaseForm"><span>🛒</span>購入登録</a>
  <a href="?page=notifications"><span>🔔</span>通知</a>
</nav>

<script>
var EDIT_ID = '<?= itemId ?>';
var PREFILL_NAME = '<?= prefillName ?>';
var ORIGINAL_DAYS_PER_UNIT = null;
var ORIGINAL_DAILY_CONSUMPTION_DISPLAY = null;
var ALT_MAX = 10;
var altSeq = 0;

document.getElementById('notify_target_type').addEventListener('change', function() {
  document.getElementById('specificUserRow').style.display =
    this.value === 'specific_user' ? 'block' : 'none';
});

function init() {
  // ユーザー一覧取得（通知先選択用）
  google.script.run.withSuccessHandler(function(res) {
    if (!res.success) return;
    var sel = document.getElementById('notify_target_user_id');
    res.data.forEach(function(u) {
      var opt = document.createElement('option');
      opt.value = u.user_id; opt.text = u.user_name;
      sel.appendChild(opt);
    });
  }).getUsers();

  if (EDIT_ID) {
    document.getElementById('pageTitle').textContent = '消耗品編集';
    google.script.run.withSuccessHandler(function(res) {
      if (!res.success) { showMsg(res.message, true); return; }
      fillForm(res.data);
    }).getItemById(EDIT_ID);
  } else if (PREFILL_NAME) {
    document.getElementById('item_name').value = PREFILL_NAME;
  }
}

function addAlt(name, url, note) {
  var list = document.getElementById('altList');
  if (list.children.length >= ALT_MAX) {
    alert('代替品は最大 ' + ALT_MAX + ' 件までです。');
    return;
  }
  var id = 'alt_' + (altSeq++);
  var div = document.createElement('div');
  div.className = 'alt-row';
  div.id = id;
  div.innerHTML =
    '<button type="button" class="alt-del" onclick="removeAlt(\'' + id + '\')" title="削除">&times;</button>' +
    '<input type="text" class="alt-name" placeholder="商品名 *">' +
    '<input type="url" class="alt-url" placeholder="購入先URL (任意)">' +
    '<input type="text" class="alt-note" placeholder="メモ (任意。例: 3個セットのみ)">';
  list.appendChild(div);
  if (name) div.querySelector('.alt-name').value = name;
  if (url) div.querySelector('.alt-url').value = url;
  if (note) div.querySelector('.alt-note').value = note;
}

function removeAlt(id) {
  var el = document.getElementById(id);
  if (el) el.parentNode.removeChild(el);
}

function collectAlts() {
  var rows = document.querySelectorAll('#altList .alt-row');
  var result = [];
  for (var i = 0; i < rows.length; i++) {
    var name = rows[i].querySelector('.alt-name').value.trim();
    if (!name) continue;
    result.push({
      name: name,
      url: rows[i].querySelector('.alt-url').value.trim(),
      note: rows[i].querySelector('.alt-note').value.trim()
    });
  }
  return result;
}

function fillAlts(alts) {
  document.getElementById('altList').innerHTML = '';
  if (!alts || !alts.length) return;
  for (var i = 0; i < alts.length; i++) {
    addAlt(alts[i].name, alts[i].url, alts[i].note);
  }
}

function fillForm(item) {
  document.getElementById('item_id').value = item.item_id;
  document.getElementById('item_name').value = item.item_name || '';
  document.getElementById('category').value = item.category || '';
  document.getElementById('unit').value = item.unit || '';
  document.getElementById('default_purchase_qty').value = item.default_purchase_qty || 1;
  var dpu = Number(item.days_per_unit) || 30;
  var dcDisplay = Math.round((1 / dpu) * 10000) / 10000;
  document.getElementById('daily_consumption').value = dcDisplay;
  ORIGINAL_DAYS_PER_UNIT = dpu;
  ORIGINAL_DAILY_CONSUMPTION_DISPLAY = dcDisplay;
  var alertDays = (Number(item.lead_days) || 0) + (Number(item.safety_days) || 0);
  document.getElementById('alert_before_days').value = alertDays;
  document.getElementById('low_stock_threshold_qty').value =
    (item.low_stock_threshold_qty !== '' && item.low_stock_threshold_qty !== null) ? item.low_stock_threshold_qty : '';
  document.getElementById('purchase_url').value = item.purchase_url || '';
  document.getElementById('notify_target_type').value = item.notify_target_type || 'all';
  document.getElementById('notify_target_user_id').value = item.notify_target_user_id || '';
  var ne = item.notification_enabled;
  document.getElementById('notification_enabled').checked =
    (ne === true || ne === 'true' || ne === 'TRUE');
  var iu = item.is_inventory_unknown;
  document.getElementById('is_inventory_unknown').checked =
    (iu === true || iu === 'true' || iu === 'TRUE');
  fillAlts(Array.isArray(item.alternatives) ? item.alternatives : []);
  document.getElementById('item_memo').value = item.item_memo || '';
  document.getElementById('notify_target_type').dispatchEvent(new Event('change'));
}

function save(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '保存中...';

  var data = {
    item_id: document.getElementById('item_id').value || '',
    item_name: document.getElementById('item_name').value,
    category: document.getElementById('category').value,
    unit: document.getElementById('unit').value,
    default_purchase_qty: document.getElementById('default_purchase_qty').value,
    days_per_unit: (function() {
      var dc = Number(document.getElementById('daily_consumption').value) || 0.03;
      // 表示値から変更されていなければ元の days_per_unit を保持（丸め誤差防止）
      if (ORIGINAL_DAYS_PER_UNIT !== null && dc === ORIGINAL_DAILY_CONSUMPTION_DISPLAY) {
        return ORIGINAL_DAYS_PER_UNIT;
      }
      return Math.round((1 / dc) * 100) / 100;
    })(),
    alert_before_days: document.getElementById('alert_before_days').value,
    low_stock_threshold_qty: document.getElementById('low_stock_threshold_qty').value,
    purchase_url: document.getElementById('purchase_url').value,
    notify_target_type: document.getElementById('notify_target_type').value,
    notify_target_user_id: document.getElementById('notify_target_user_id').value,
    notification_enabled: document.getElementById('notification_enabled').checked,
    is_inventory_unknown: document.getElementById('is_inventory_unknown').checked,
    alternatives: collectAlts(),
    item_memo: document.getElementById('item_memo').value
  };

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false; btn.textContent = '保存';
      if (res.success) {
        showMsg(res.message, false);
        if (!EDIT_ID) document.getElementById('itemForm').reset();
      } else {
        showMsg(res.message, true);
      }
    })
    .withFailureHandler(function(e) {
      btn.disabled = false; btn.textContent = '保存';
      showMsg(e.message, true);
    })
    .saveItem(data);
}

function showMsg(msg, isErr) {
  document.getElementById('msg').innerHTML =
    '<div class="msg ' + (isErr ? 'msg-error' : 'msg-success') + '">' + esc(msg) + '</div>';
  window.scrollTo(0, 0);
}
function esc(s) {
  if (!s && s !== 0) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}
init();
</script>
</body>
</html>
