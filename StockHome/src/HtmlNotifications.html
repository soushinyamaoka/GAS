<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="<?= webAppUrl ?>" target="_top">
<title>通知履歴 - StockHome</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:15px;color:#333;background:#f5f5f5;padding-bottom:70px}
.container{max-width:480px;margin:0 auto;padding:12px}
h1{font-size:18px;padding:14px 12px;background:#e67e22;color:#fff;text-align:center}
.card{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.1)}
.notif-item{font-weight:bold;font-size:15px}
.notif-meta{font-size:13px;color:#666;margin-top:2px}
.notif-msg{font-size:13px;margin-top:4px;padding:8px;background:#f9f9f9;
  border-radius:4px;white-space:pre-wrap;word-break:break-word}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;color:#fff}
.badge-days{background:#3498db}
.badge-qty{background:#8e44ad}.badge-both{background:#e74c3c}
.actions{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.btn-sm{padding:6px 10px;border:none;border-radius:4px;font-size:12px;
  cursor:pointer;color:#fff}
.bg-orange{background:#f39c12}.bg-gray{background:#95a5a6}.bg-blue{background:#3498db}
.loading{text-align:center;padding:20px;color:#888}
.msg{padding:10px;border-radius:6px;margin-bottom:10px;font-size:14px}
.msg-success{background:#d4edda;color:#155724}
.msg-error{background:#f8d7da;color:#721c24}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:1px solid #ddd;display:flex;z-index:100}
.nav a{flex:1;text-align:center;padding:8px 2px 6px;font-size:11px;
  color:#888;text-decoration:none;line-height:1.2}
.nav a.active{color:#4a86c8;font-weight:bold}
.nav a span{display:block;font-size:18px;margin-bottom:2px}
</style>
</head>
<body>

<h1>通知履歴</h1>
<div class="container">
  <div id="msg"></div>
  <div id="list"><div class="loading">読み込み中...</div></div>
</div>

<nav class="nav">
  <a href="?page=home"><span>🏠</span>ホーム</a>
  <a href="?page=items"><span>📦</span>消耗品</a>
  <a href="?page=stocks"><span>📊</span>在庫</a>
  <a href="?page=purchaseForm"><span>🛒</span>購入登録</a>
  <a href="?page=notifications" class="active"><span>🔔</span>通知</a>
</nav>

<script>
function load() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) { showMsg(res.message, true); return; }
      render(res.data);
    })
    .withFailureHandler(function(e) { showMsg(e.message, true); })
    .getNotificationList();
}

function render(logs) {
  if (logs.length === 0) {
    document.getElementById('list').innerHTML =
      '<div class="card"><p>通知履歴はまだありません。</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < logs.length; i++) {
    var n = logs[i];

    // 通知理由バッジ
    var reasonBadge = 'badge-days';
    if (n.notification_reason === 'qty_threshold') reasonBadge = 'badge-qty';
    if (n.notification_reason === 'both') reasonBadge = 'badge-both';

    var reasonLabel = n.notification_reason || '';
    if (reasonLabel === 'days_threshold') reasonLabel = '日数';
    else if (reasonLabel === 'qty_threshold') reasonLabel = '数量';
    else if (reasonLabel === 'both') reasonLabel = '両方';

    // 日時フォーマット
    var dt = n.created_at ? new Date(n.created_at) : null;
    var dtStr = dt ? (dt.getMonth()+1) + '/' + dt.getDate() + ' ' +
      ('0'+dt.getHours()).slice(-2) + ':' + ('0'+dt.getMinutes()).slice(-2) : '';

    html += '<div class="card">';
    html += '<div class="notif-item">' + esc(n.item_name) + '</div>';
    html += '<div class="notif-meta">' + dtStr +
      ' <span class="badge ' + reasonBadge + '">' + reasonLabel + '</span></div>';
    html += '<div class="notif-msg">' + esc(n.message) + '</div>';

    // スヌーズアクション
    html += '<div class="actions">';
    html += '<button class="btn-sm bg-orange" onclick="snooze(\'' + esc(n.item_id) + '\',\'3days\')">3日後</button>';
    html += '<button class="btn-sm bg-blue" onclick="snooze(\'' + esc(n.item_id) + '\',\'7days\')">7日後</button>';
    html += '<button class="btn-sm bg-gray" onclick="snooze(\'' + esc(n.item_id) + '\',\'ignore\')">無視</button>';
    html += '</div></div>';
  }
  document.getElementById('list').innerHTML = html;
}

function snooze(itemId, action) {
  google.script.run
    .withSuccessHandler(function(res) { showMsg(res.message, !res.success); })
    .withFailureHandler(function(e) { showMsg(e.message, true); })
    .snoozeNotification({ item_id: itemId, action: action });
}

function showMsg(msg, isErr) {
  document.getElementById('msg').innerHTML =
    '<div class="msg ' + (isErr ? 'msg-error' : 'msg-success') + '">' + esc(msg) + '</div>';
}
function esc(s) {
  if (!s && s !== 0) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}
load();
</script>
</body>
</html>
