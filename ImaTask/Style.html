<style>
/* =====================================================================
   日常タスク常時表示アプリ - スタイル
   Android タブレット (横向き) で遠目から見ても分かりやすいデザイン
   ===================================================================== */

/* ---------- リセット & 基本 ---------- */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  width: 100%;
}

body {
  /* 遠くから見ても目に優しい配色を意識 */
  background: #f4f6fa;
  color: #1f2937;
  font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
  font-size: 22px;
  line-height: 1.4;
  /* タブレットでスクロールバーが目立たないように */
  overflow-x: hidden;
}

.hidden {
  display: none !important;
}

/* ---------- ヘッダー ---------- */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
  color: #fff;
  box-shadow: 0 4px 8px rgba(0,0,0,0.12);
}

.header-left,
.header-center,
.header-right {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header-center {
  flex: 1;
  text-align: center;
}

/* 時計 - 一番大きく表示する要素 */
.clock {
  font-size: 64px;
  font-weight: 800;
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.date-label {
  font-size: 18px;
  opacity: 0.85;
  margin-top: 4px;
}

/* 時間帯名 */
.slot-name {
  font-size: 42px;
  font-weight: 700;
}

.slot-remain {
  font-size: 20px;
  margin-top: 6px;
  opacity: 0.9;
}

/* 残タスク数表示 */
.remain-label {
  font-size: 18px;
  opacity: 0.85;
}

.remain-count {
  font-size: 60px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

/* 残タスクが 0 件のときの強調 (達成感のある緑) */
.remain-count.is-zero {
  color: #bbf7d0;
}

/* ---------- 全体警告メッセージ ---------- */
.global-alert {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  padding: 14px 28px;
  background: #fef9c3;
  color: #854d0e;
  font-size: 22px;
  font-weight: 700;
  border-bottom: 2px solid #facc15;
}

.global-alert.is-danger {
  background: #fee2e2;
  color: #991b1b;
  border-bottom-color: #ef4444;
}

.global-alert-msg {
  flex: 1;
  min-width: 0;
}

/* ---------- 一括完了ボタン ---------- */
.bulk-complete-btn {
  flex-shrink: 0;
  padding: 10px 22px;
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  background: #f59e0b;
  border: 2px solid #d97706;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  transition: background-color 0.15s, transform 0.1s;
  font-family: inherit;
}

.bulk-complete-btn:hover {
  background: #d97706;
}

.bulk-complete-btn:active {
  transform: scale(0.96);
}

/* 危険状態 (overdue) のときは赤系 */
.global-alert.is-danger .bulk-complete-btn,
.bulk-complete-btn--overdue {
  background: #dc2626;
  border-color: #991b1b;
}

.global-alert.is-danger .bulk-complete-btn:hover,
.bulk-complete-btn--overdue:hover {
  background: #991b1b;
}

/* ---------- 前時間帯の未完了タスク ---------- */
.overdue-section {
  margin: 16px 24px;
  padding: 16px 20px;
  background: #fee2e2;
  border: 3px solid #ef4444;
  border-radius: 12px;
  /* 軽く揺れるアニメーションで警告 */
  animation: shake-warn 1.6s ease-in-out infinite;
}

.overdue-title {
  font-size: 26px;
  font-weight: 800;
  color: #991b1b;
  margin-bottom: 8px;
}

.overdue-body {
  font-size: 22px;
  color: #7f1d1d;
}

.overdue-body .overdue-slot {
  margin-top: 6px;
}

.overdue-body .overdue-slot-name {
  font-weight: 700;
  margin-right: 8px;
}

.overdue-body .overdue-task {
  display: inline-block;
  margin: 2px 6px;
  padding: 2px 10px;
  background: #fff;
  border: 1px solid #ef4444;
  border-radius: 999px;
  font-size: 18px;
}

/* 前時間帯セクション: 時間帯ごとのヘッダー (名前 + 一括完了ボタン) */
.overdue-slot-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

/* 前時間帯セクション内の個別タスク (チェックボックス付き) */
.overdue-task-list {
  list-style: none;
  margin-top: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.overdue-task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: #fff;
  border: 2px solid #ef4444;
  border-radius: 999px;
  font-size: 20px;
  font-weight: 700;
  color: #7f1d1d;
  cursor: pointer;
  user-select: none;
  transition: background-color 0.2s, transform 0.1s;
}

.overdue-task-item:active {
  transform: scale(0.97);
}

.overdue-task-item .task-checkbox {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}

.overdue-task-label {
  white-space: nowrap;
}

/* ---------- メイン (担当者カラム) ---------- */
.board-main {
  display: grid;
  /* 担当者数に応じて自動で 2〜N カラム構成になるよう minmax を設定 */
  grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
  gap: 20px;
  padding: 20px 24px 24px;
}

/* 担当者ごとのカード */
.assignee-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  padding: 18px 20px 22px;
  display: flex;
  flex-direction: column;
}

.assignee-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 3px solid #e5e7eb;
}

.assignee-name {
  font-size: 32px;
  font-weight: 800;
  color: #2563eb;
}

.assignee-count {
  font-size: 20px;
  color: #6b7280;
  font-variant-numeric: tabular-nums;
}

/* タスク一覧 */
.task-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* 個別タスク - チェックボックスのラベル全体 */
.task-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: #fafafa;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  font-size: 26px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  /* 状態変化をスムーズに */
  transition: background-color 0.2s, border-color 0.2s, transform 0.1s;
}

.task-item:active {
  transform: scale(0.98);
}

/* タップしやすい大きなチェックボックス */
.task-checkbox {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
  cursor: pointer;
  /* 視認性のため accent-color を青に */
  accent-color: #2563eb;
}

.task-name {
  flex: 1;
}

/* ----- 完了タスク ----- */
.task-item.is-done {
  background: #f3f4f6;
  border-color: #d1d5db;
  color: #9ca3af;
}

.task-item.is-done .task-name {
  text-decoration: line-through;
  text-decoration-thickness: 2px;
}

/* ----- 未完了タスク (通常の強調) ----- */
.task-item.is-pending {
  /* 軽い強調: 濃い枠線 */
  border-color: #cbd5e1;
}

/* ----- 重要タスクで未完了 ----- */
.task-item.is-important.is-pending {
  font-size: 28px;
  border-color: #f59e0b;
  background: #fffbeb;
  /* ゆっくり脈打つ拡大縮小 */
  animation: important-pulse 2.6s ease-in-out infinite;
}

/* ----- 終了時刻が近い未完了タスク (黄色強調) ----- */
.task-item.is-warning {
  background: #fef08a;
  border-color: #facc15;
  color: #713f12;
  font-weight: 800;
  /* ゆっくり点滅 */
  animation: warn-blink 1.6s ease-in-out infinite;
}

/* 重要 + 警告が重なった場合は警告アニメを優先 */
.task-item.is-important.is-warning {
  animation: warn-blink 1.6s ease-in-out infinite;
}

/* ----- 時間超過タスク (赤警告) ----- */
.task-item.is-overdue {
  background: #fee2e2;
  border-color: #ef4444;
  color: #7f1d1d;
  font-weight: 800;
  animation: shake-warn 1.6s ease-in-out infinite;
}

.task-item.is-overdue::before {
  /* 警告アイコン */
  content: '⚠';
  font-size: 30px;
  margin-right: 4px;
}

/* タスクが空のとき */
.task-empty {
  padding: 16px;
  font-size: 22px;
  color: #6b7280;
  background: #f9fafb;
  border: 2px dashed #d1d5db;
  border-radius: 12px;
  text-align: center;
}

/* ---------- フッター ---------- */
.app-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 24px;
  font-size: 14px;
  color: #6b7280;
  background: #fff;
  border-top: 1px solid #e5e7eb;
}

.conn-ok    { color: #059669; }
.conn-error { color: #dc2626; font-weight: 700; }

.last-updated {
  font-variant-numeric: tabular-nums;
}

/* =====================================================================
   アニメーション定義
   常時表示でも目が疲れにくいよう、ゆっくりめに設定
   ===================================================================== */

/* 黄色警告: ゆっくり点滅 (透明度と背景色をわずかに変化) */
@keyframes warn-blink {
  0%, 100% {
    background-color: #fef08a;
    box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.0);
  }
  50% {
    background-color: #fde68a;
    box-shadow: 0 0 0 6px rgba(250, 204, 21, 0.35);
  }
}

/* 赤警告: 軽く揺れる */
@keyframes shake-warn {
  0%, 100% { transform: translateX(0); }
  20%      { transform: translateX(-3px); }
  40%      { transform: translateX(3px); }
  60%      { transform: translateX(-2px); }
  80%      { transform: translateX(2px); }
}

/* 重要タスク: ゆっくり拡大縮小 */
@keyframes important-pulse {
  0%, 100% { transform: scale(1.00); }
  50%      { transform: scale(1.02); }
}

/* レスポンシブ: 縦持ち時は 1 カラム */
@media (max-width: 720px) {
  .board-main {
    grid-template-columns: 1fr;
  }
  .clock      { font-size: 48px; }
  .slot-name  { font-size: 30px; }
  .remain-count { font-size: 44px; }
}
</style>
